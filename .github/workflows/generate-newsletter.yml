name: Generate Newsletter & Diary

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0:00 = 北京时间 8:00
  workflow_dispatch:

env:
  NEWSLETTER_DIR: newsletters
  TZ: Asia/Shanghai

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Install dependencies
      run: uv sync --no-lock
      working-directory: script/newsletter

    - name: Generate newsletter
      run: uv run main.py all
      working-directory: script/newsletter
      env:
        PUSH_DEER_KEY: ${{ secrets.PUSH_DEER_KEY }}

    - name: Commit and push
      run: |
        git config user.name "Newsletter Bot"
        git config user.email "bot@github.com"
        git add newsletters/
        git diff --staged --quiet || git commit -m "newsletter: $(date +'%Y-%m-%d')" && git push
