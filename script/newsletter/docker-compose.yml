services:
  newsletter:
    build: .
    container_name: my-newsletter
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
      - NEWSLETTER_DIR=/app/newsletter
    volumes:
      # 挂载输出目录
      - ./output:/app/newsletter
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
